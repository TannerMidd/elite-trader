<svg viewBox="0 0 812 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Frameshift">
  <defs>
    <linearGradient id="lg-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb257"/>
      <stop offset="1" stop-color="#ff6a00"/>
    </linearGradient>
    <radialGradient id="lg-inner" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#1c202a"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </radialGradient>
    <filter id="lg-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- icon mark (scaled from the 256 grid: x0.72, offset) -->
  <g transform="translate(16,28) scale(0.56)">
    <polygon points="222,128 175,209 81,209 34,128 81,47 175,47"
             fill="url(#lg-inner)" stroke="url(#lg-orange)" stroke-width="11"
             stroke-linejoin="round" filter="url(#lg-glow)"/>
    <path d="M92,172 Q120,150 168,96" fill="none" stroke="url(#lg-orange)"
          stroke-width="13" stroke-linecap="round" filter="url(#lg-glow)"/>
    <circle cx="92" cy="172" r="15" fill="none" stroke="url(#lg-orange)" stroke-width="8"/>
    <circle cx="92" cy="172" r="4.5" fill="#ffd7a1"/>
    <circle cx="168" cy="96" r="17" fill="#ff7a12" filter="url(#lg-glow)"/>
    <circle cx="168" cy="96" r="17" fill="none" stroke="#ffdcb0" stroke-width="3"/>
    <path d="M191,63 l3.4,10 10,3.4 -10,3.4 -3.4,10 -3.4,-10 -10,-3.4 10,-3.4 z" fill="#ffd7a1"/>
  </g>

  <!-- wordmark -->
  <text x="176" y="106" font-family="'Segoe UI Variable Display','Segoe UI',Arial,sans-serif"
        font-size="66" font-weight="800" letter-spacing="6">
    <tspan fill="#ff7a12">FRAME</tspan><tspan fill="#aab3bf" font-weight="300">SHIFT</tspan>
  </text>
  <text x="180" y="147" font-family="'Segoe UI','Segoe UI',Arial,sans-serif"
        font-size="20.5" letter-spacing="3" fill="#8a8f98">COMPANION COMPUTER FOR ELITE DANGEROUS</text>
</svg>
