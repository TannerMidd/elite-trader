name: Test

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned frontend tools
        run: npm ci --no-audit --no-fund

      - name: Install pinned dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q app.py elite tests

      - name: Run frontend static and unit gates
        run: npm run verify:frontend

      - name: Install Playwright browsers
        if: runner.os == 'Windows'
        run: npx playwright install chromium webkit

      - name: Install Playwright browsers and Linux dependencies
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium webkit

      - name: Run browser journeys
        run: npm run test:e2e:ci

      - name: Run test suite
        shell: pwsh
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          $failed = @()
          Get-ChildItem tests -Filter "test_*.py" | Sort-Object Name | ForEach-Object {
            Write-Host "== $($_.Name)"
            python tools/run_python_test_file.py $_.FullName
            $exitCode = $LASTEXITCODE
            if ($exitCode -ne 0) {
              $failed += $_.Name
              Write-Host "::error file=tests/$($_.Name),title=Python test failed::$($_.Name) exited with code $exitCode"
            }
          }
          if ($failed.Count -gt 0) { throw "Failing tests: $($failed -join ', ')" }
